# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Color numbers
# 0 - Black
# 1 - Red
# 2 - Green
# 3 - Yellow
# 4 - Blue
# 5 - Magenta
# 6 - Cyan
# 7 - White
# 8 - Bright Black
# 9 - Bright Red/Orange
# 10 - Bright Green

format = """
$directory\
[Óāį](fg:4 bg:7)\
$git_branch\
$git_state\
$git_status\
[Óāį](fg:7 bg:8)\
$time\
$cmd_duration\
$character
"""

right_format = '$all'

add_newline = true
# command_timeout = 1000

[character]
success_symbol = '[ ‚ěú](bold green) '
error_symbol   = '[ ‚úó](#E84D44) '

[directory]
truncate_to_repo = true
format           = "[‚ĖĎ‚Ėí‚Ėď](fg:4)[ $path ]($style)"
style            = "fg:254 bg:4"

[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
symbol = "Ôźė "
style  = "fg:#1C3A5E bg:7"

[git_status]
ahead     = "‚á°${count}"
diverged  = "‚á°${ahead_count}‚á£${behind_count}"
behind    = "‚á£${count}"
untracked = '?$count '
modified  = '!$count '
stashed   = '*$count '
staged    = '+$count '
deleted   = '‚úė$count '
format    = '[$conflicted$stashed$staged$deleted$renamed$modified$untracked]($style)'
style     = "fg:#1C3A5E bg:7"

[git_state]
format = "([ $state( $progress_current/$progress_total) [ ](bg:7)]($style))"
style  = "bold bg:3"

[aws]
disabled = true

[time]
disabled = false
format = "[ ÔÄó $time  ]($style)"
time_format = "%R" # Hour:Minute Format

[cmd_duration]
min_time = 1_000
format   = "[ ÔČí $duration ]($style)"
style    = "fg:bright-white bg:18"
